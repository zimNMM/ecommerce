<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Delete Review</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
</head>
<body class="bg-gray-100 flex flex-col min-h-screen">

    <main class="container mx-auto py-10">
        <section class="bg-white p-6 rounded-lg shadow-md text-center">
            <h1 class="text-2xl font-bold text-gray-800 mb-4">Delete Review</h1>
            <p class="text-gray-600 mb-4">Are you sure you want to delete this review?</p>
            <p class="text-gray-800 mb-4">{{ review.content }}</p>

            <form method="post" class="flex justify-center items-center">
                {% csrf_token %}
                <button type="submit" class="bg-red-500 text-white px-4 py-2 rounded-md mr-4">Yes, delete</button>
                <a href="{% url 'product_detail' product_id=review.product.product_id %}" class="bg-gray-200 text-gray-800 px-4 py-2 rounded-md">Cancel</a>
            </form>
        </section>
    </main>
</body>
</html>
